# 빌라톡 iOS 빌드 (Capacitor → App Store / TestFlight)
# Codemagic 클라우드 맥에서 .ipa 빌드 + 제출. 맥 불필요.
# 사전준비: Codemagic UI 에 App Store Connect API 키를 'VillatalkASC' 이름으로 등록.
workflows:
  ios-villatolk:
    name: 빌라톡 iOS (Capacitor)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: VillatalkASC   # ← Codemagic UI에 등록한 ASC API 키 이름
    environment:
      # ios_signing 블록 제거 — 빌드 시작 전 사전검사가 --create 스크립트보다 먼저 실패시킴.
      # 대신 스크립트(아래 '코드 서명' 단계)에서 fetch-signing-files --create 로 직접 처리.
      vars:
        BUNDLE_ID: "store.villtalk.app"
        XCODE_PROJECT: "apps/web/ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        DEVELOPMENT_TEAM: "P5KTX94H54"   # The Zoom Works Co., Ltd.
      node: 22
      xcode: latest
    scripts:
      - name: npm 설치 (모노레포 루트)
        script: npm ci
      - name: Capacitor iOS 동기화
        script: |
          cd apps/web
          npx cap sync ios
      - name: 코드 서명 — 옛 프로파일 정리 후 새로 발급
        script: |
          set -e
          keychain initialize

          echo "=== 1. 기존 IOS_APP_STORE 프로파일 정리 (Push 없이 캐시된 것 제거) ==="
          app-store-connect profiles list --json > /tmp/profiles.json 2>/dev/null || echo '[]' > /tmp/profiles.json
          python3 - <<'PY'
          import json, subprocess, os
          bundle = os.environ['BUNDLE_ID']
          try:
              data = json.load(open('/tmp/profiles.json'))
              items = data if isinstance(data, list) else data.get('data', [])
          except Exception:
              items = []
          deleted = 0
          for p in items:
              a = p.get('attributes', {})
              if a.get('profileType') == 'IOS_APP_STORE' and bundle in (a.get('name','') + (a.get('bundleId') or '')):
                  pid = p.get('id')
                  print(f"  delete: {a.get('name')} (id={pid})")
                  subprocess.run(['app-store-connect','profiles','delete', pid], check=False)
                  deleted += 1
          print(f"  총 {deleted}개 삭제")
          PY

          echo "=== 2. 새 프로파일 발급 (App ID 현재 capability = Push 포함) ==="
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

          echo "=== 3. 인증서 키체인 + 프로젝트 패치 ==="
          keychain add-certificates
          cd apps/web/ios/App
          xcode-project use-profiles
      - name: iOS .ipa 빌드
        script: |
          cd apps/web/ios/App
          xcode-project build-ipa \
            --project App.xcodeproj \
            --scheme "$XCODE_SCHEME" \
            --archive-xcargs "DEVELOPMENT_TEAM=$DEVELOPMENT_TEAM"
    artifacts:
      - apps/web/ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true   # 빌드 성공 시 TestFlight 자동 업로드
