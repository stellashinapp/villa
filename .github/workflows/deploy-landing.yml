name: Deploy Landing to KakaoCloud VM

on:
  push:
    branches: [main]
    paths:
      - 'apps/landing/**'
      - '.github/workflows/deploy-landing.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy Landing (VM)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (monorepo root)
        run: npm ci --no-audit --no-fund

      - name: Build Landing (standalone)
        run: npm run build:landing

      - name: Package deploy artifact
        run: |
          set -e
          STANDALONE_DIR=apps/landing/.next/standalone
          cp -r apps/landing/.next/static "$STANDALONE_DIR/apps/landing/.next/static"
          if [ -d apps/landing/public ]; then
            cp -r apps/landing/public "$STANDALONE_DIR/apps/landing/public"
          fi
          tar -czf villatolk-landing.tar.gz -C "$STANDALONE_DIR" .
          ls -lh villatolk-landing.tar.gz

      - name: Copy artifact to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: villatolk-landing.tar.gz
          target: /tmp/

      - name: Deploy & restart on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            DEPLOY_ROOT=/home/ubuntu/villatolk-landing
            CURRENT=$DEPLOY_ROOT/current
            PREV=$DEPLOY_ROOT/prev
            STAGING=$DEPLOY_ROOT/staging

            mkdir -p $DEPLOY_ROOT

            rm -rf $STAGING
            mkdir -p $STAGING
            tar -xzf /tmp/villatolk-landing.tar.gz -C $STAGING
            rm -f /tmp/villatolk-landing.tar.gz

            if [ -d "$CURRENT" ]; then
              rm -rf $PREV
              mv $CURRENT $PREV
            fi
            mv $STAGING $CURRENT

            cd $CURRENT/apps/landing
            if pm2 describe villatolk-landing > /dev/null 2>&1; then
              PORT=3301 HOSTNAME=0.0.0.0 NODE_ENV=production pm2 restart villatolk-landing --update-env
            else
              PORT=3301 HOSTNAME=0.0.0.0 NODE_ENV=production pm2 start server.js --name villatolk-landing
            fi
            pm2 save

            sleep 2
            curl -sf http://127.0.0.1:3301 -o /dev/null && echo "healthy" || (echo "unhealthy"; pm2 logs villatolk-landing --lines 30 --nostream; exit 1)

      - name: Summary
        if: always()
        run: |
          echo "### Landing deploy (KakaoCloud VM)" >> $GITHUB_STEP_SUMMARY
          echo "- Result: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- VM: 210.109.15.149 (kr-central-2-a)" >> $GITHUB_STEP_SUMMARY
          echo "- Internal port: 3301" >> $GITHUB_STEP_SUMMARY
          echo "- Public URLs (after DNS): https://villtalk.store" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
