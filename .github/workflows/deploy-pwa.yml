name: Deploy PWA to KakaoCloud VM

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - '.github/workflows/deploy-pwa.yml'
  workflow_dispatch:

# 동시 배포 레이스 방지 — 항상 최신 커밋만 배포 (이전 진행분은 취소)
concurrency:
  group: deploy-pwa
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy PWA (VM)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (monorepo root)
        run: npm ci --no-audit --no-fund

      - name: Build PWA (standalone)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build:pwa

      - name: Package deploy artifact
        run: |
          set -e
          STANDALONE_DIR=apps/web/.next/standalone
          # standalone 폴더에 static 을 같이 묶음 (Next.js 표준)
          cp -r apps/web/.next/static "$STANDALONE_DIR/apps/web/.next/static"
          # public 은 PWA 가 manifest.ts 동적 생성이라 보통 없음 — 있을 때만 복사
          if [ -d apps/web/public ]; then
            cp -r apps/web/public "$STANDALONE_DIR/apps/web/public"
          else
            echo "ℹ️ apps/web/public 없음 — 스킵 (manifest 는 app/manifest.ts 가 동적 생성)"
          fi
          # tar.gz 를 workspace 루트에 저장 (appleboy/scp-action 이 Docker 라 /tmp 접근 불가)
          tar -czf villatolk-pwa.tar.gz -C "$STANDALONE_DIR" .
          ls -lh villatolk-pwa.tar.gz

      - name: Copy artifact to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: villatolk-pwa.tar.gz
          target: /tmp/

      - name: Deploy & restart on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            DEPLOY_ROOT=/home/ubuntu/villatolk-pwa
            CURRENT=$DEPLOY_ROOT/current
            PREV=$DEPLOY_ROOT/prev
            STAGING=$DEPLOY_ROOT/staging

            mkdir -p $DEPLOY_ROOT

            # 신규 버전을 staging 에 풀어둠
            rm -rf $STAGING
            mkdir -p $STAGING
            tar -xzf /tmp/villatolk-pwa.tar.gz -C $STAGING
            rm -f /tmp/villatolk-pwa.tar.gz

            # 원자적 교체: prev <- current <- staging
            if [ -d "$CURRENT" ]; then
              rm -rf $PREV
              mv $CURRENT $PREV
            fi
            mv $STAGING $CURRENT

            # PM2 재시작 (없으면 신규 등록)
            cd $CURRENT/apps/web
            if pm2 describe villatolk-pwa > /dev/null 2>&1; then
              PORT=3300 HOSTNAME=0.0.0.0 NODE_ENV=production pm2 restart villatolk-pwa --update-env
            else
              PORT=3300 HOSTNAME=0.0.0.0 NODE_ENV=production pm2 start server.js --name villatolk-pwa
            fi
            pm2 save

            # 헬스체크
            sleep 2
            curl -sf http://127.0.0.1:3300 -o /dev/null && echo "healthy" || (echo "unhealthy"; pm2 logs villatolk-pwa --lines 30 --nostream; exit 1)

      - name: Summary
        if: always()
        run: |
          echo "### PWA deploy (KakaoCloud VM)" >> $GITHUB_STEP_SUMMARY
          echo "- Result: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- VM: 210.109.15.149 (kr-central-2-a)" >> $GITHUB_STEP_SUMMARY
          echo "- Internal port: 3300" >> $GITHUB_STEP_SUMMARY
          echo "- Public URLs (after DNS): https://villatolk.app" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
