name: Deploy PWA to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - '.github/workflows/deploy-pwa.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Production deploy (PWA)
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      # PWA 프로젝트 ID — admin-web/landing 과 다름
      VERCEL_PROJECT_ID: prj_7o8cpBNMY7gB5zcK0g8LL1SnU1y9
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Vercel whoami (sanity check)
        run: vercel whoami --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production (apps/web)
        id: deploy
        working-directory: apps/web
        run: |
          set -e
          OUT=$(vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tee /dev/stderr | tail -1)
          echo "url=$OUT" >> $GITHUB_OUTPUT
          echo "Deployed: $OUT"

      - name: Summary
        if: always()
        run: |
          echo "### PWA deploy" >> $GITHUB_STEP_SUMMARY
          echo "- Result: ${{ steps.deploy.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- Deployment URL: ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "- Production alias: https://villatolk-pwa.vercel.app" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
