name: Deploy admin-web to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'apps/admin-web/**'
      - 'packages/**'
      - 'vercel.json'
      - '.github/workflows/deploy-vercel.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Production deploy
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Vercel whoami (sanity check)
        run: vercel whoami --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        id: deploy
        run: |
          set -e
          OUT=$(vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tee /dev/stderr | tail -1)
          echo "url=$OUT" >> $GITHUB_OUTPUT
          echo "Deployed: $OUT"

      - name: Summary
        if: always()
        run: |
          echo "### Vercel deploy" >> $GITHUB_STEP_SUMMARY
          echo "- Result: ${{ steps.deploy.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- Deployment URL: ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "- Production alias: https://villatolk-admin.vercel.app" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
